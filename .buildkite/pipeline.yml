env:
  JULIA_NUM_THREADS: auto
  PYTHON: ""
  PYCALL_DEBUG_BUILD: yes

secrets:
  - CODECOV_TOKEN

steps:
  - label: "General Tests"
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
          compiled_size_limit: 10737418240 # 10GiB
      - JuliaCI/julia-test#v1:
          test_args: "general"
      - JuliaCI/julia-coverage#v1:
          codecov: true

  - label: "General Tests (alpha)"
    plugins:
      - Krastanov-agent/julia#bb0dd898e0190fa025fa9eddbf5b39665edc8e6c:
          version: "alpha"
          compiled_size_limit: 10737418240 # 10GiB
      - JuliaCI/julia-test#v1:
          test_args: "general"
      - JuliaCI/julia-coverage#v1:
          codecov: true

  - label: "JET Tests"
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
          compiled_size_limit: 10737418240 # 10GiB
      - JuliaCI/julia-test#v1:
          test_args: "jet"
      - JuliaCI/julia-coverage#v1:
          codecov: true

  - label: "Docs"
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
      - QuantumSavory/julia-xvfb#v1:
    secrets:
      DOCUMENTER_KEY: DOCUMENTER_KEY_QuantumSymbolics
      ANYTHINGLLM_API_KEY: ANYTHINGLLM_API_KEY
    command: |
      julia --project=docs -e 'using Pkg; Pkg.instantiate()'
      julia -tauto --project=docs docs/make.jl
  
  - label: "Downstream Tests - {{matrix.PACKAGE}}"
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
          compiled_size_limit: 10737418240 # 10GiB
    command:
      - echo "Julia depot path $${JULIA_DEPOT_PATH}"
      - echo "TERM=$${TERM} | PYTHON=$${PYTHON} | PYCALL_DEBUG_BUILD=$${PYCALL_DEBUG_BUILD}"
      - julia --project=$(mktemp -d) -e '
        using Pkg;
        pkg"dev .";
        Pkg.add("{{matrix.PACKAGE}}");
        Pkg.build("{{matrix.PACKAGE}}");
        Pkg.test("{{matrix.PACKAGE}}");'
    matrix:
      setup:
        PACKAGE: ["QuantumSavory"]

  - label: "Downstream Dev Tests - {{matrix.PACKAGE}}"
    plugins:
      - JuliaCI/julia#v1:
          version: "1"
          compiled_size_limit: 10737418240 # 10GiB
    command:
      - echo "Julia depot path $${JULIA_DEPOT_PATH}"
      - echo "TERM=$${TERM} | PYTHON=$${PYTHON} | PYCALL_DEBUG_BUILD=$${PYCALL_DEBUG_BUILD}"
      - julia --project=$(mktemp -d) -e '
        using Pkg;
        pkg"dev .";
        Pkg.develop("{{matrix.PACKAGE}}");
        Pkg.build("{{matrix.PACKAGE}}");
        Pkg.test("{{matrix.PACKAGE}}");'
    matrix:
      setup:
        PACKAGE: ["QuantumSavory"]
